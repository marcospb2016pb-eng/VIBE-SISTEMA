<!DOCTYPE html>
<html>
<head>
    <title>VIBE - EDITAR PRODUTO</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 40px; display: flex; justify-content: center; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 400px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        .btn { background: #27ae60; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>✏️ Editar Produto</h2>
        <form method="POST">
            Código: <input type="text" name="codigo" value="{{ p.codigo }}">
            Nome: <input type="text" name="nome" value="{{ p.nome }}">
            Cor: <input type="text" name="cor" value="{{ p.cor }}">
            Preço: <input type="number" step="0.01" name="preco" value="{{ p.preco }}">
            <div style="display: flex; gap: 5px;">
                P: <input type="number" name="P" value="{{ p.p }}">
                M: <input type="number" name="M" value="{{ p.m }}">
                G: <input type="number" name="G" value="{{ p.g }}">
                GG: <input type="number" name="GG" value="{{ p.gg }}">
            </div>
            <button type="submit" class="btn">SALVAR ALTERAÇÕES</button>
            <br><br>
            <a href="/estoque_aba" style="color: gray; text-decoration: none;">Cancelar</a>
        </form>
    </div>
</body>
</html>
