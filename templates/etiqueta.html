<!DOCTYPE html>
<html>
<head>
    <style>
        /* Reseta margens para não cortar */
        body { margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; background: white;}
        
        .etiqueta {
            width: 40mm;
            height: 27mm;
            padding: 0mm; /* Sem preenchimento interno */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Alinha tudo no topo */
            overflow: hidden;
            box-sizing: border-box;
            border: 1px dashed #ccc; /* Só para ver no PC */
        }

        /* Nome do Produto - Fonte menor para não cortar */
        .nome { 
            font-size: 8px; 
            font-weight: bold; 
            text-align: center; 
            margin-top: 1mm;
            height: 3mm; /* Altura fixa */
            overflow: hidden;
        }

        /* Container do Código de Barras */
        .barcode { 
            width: 38mm; /* Quase toda a largura */
            height: 10mm; /* Espaço generoso para o código */
            margin-top: 1mm;
            margin-bottom: 1mm;
        }
        .barcode img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Encaixa sem distorcer */
        }

        /* Container Inferior (Preço + Tamanho) */
        .rodape {
            width: 38mm;
            display: flex;
            justify-content: space-between; /* Preço na esquerda, TAM na direita */
            align-items: center;
            margin-top: 1mm;
        }

        .preco { font-size: 10px; font-weight: bold; }
        
        /* O TAMANHO JÁ APARECERÁ AQUI */
        .tamanho { 
            font-size: 12px; 
            font-weight: bold; 
            border: 1px solid black; 
            padding: 2px 4px; 
        }

        @media print {
            body { border: none; }
            .etiqueta { border: none; page-break-after: always; }
            @page { size: 40mm 27mm; margin: 0; }
        }
    </style>
</head>
<body onload="window.print()">
    <div class="etiqueta">
        <div class="nome">{{ produto['nome'] }} - {{ produto['cor'] }}</div>
        
        <div class="barcode">
            <img src="data:image/png;base64,{{ barcode_img }}" alt="barcode">
        </div>

        <div class="rodape">
            <div class="preco">R$ {{ "%.2f"|format(produto['preco']) }}</div>
            
            <div class="tamanho">TAM: {{ tamanho|upper }}</div>
        </div>
    </div>
</body>
</html>
