<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Estoque</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        .form-group { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Cadastro de Estoque</h1>
    <form action="/cadastrar" method="POST">
        Cod: <input type="text" name="codigo" style="width: 50px;">
        Nome: <input type="text" name="nome">
        Preço: <input type="text" name="preco" style="width: 60px;">
        P: <input type="number" name="P" style="width: 40px;">
        M: <input type="number" name="M" style="width: 40px;">
        G: <input type="number" name="G" style="width: 40px;">
        GG: <input type="number" name="GG" style="width: 40px;">
        <button type="submit">Add</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Cod</th>
                <th>Nome</th>
                <th>P|M|G|GG</th>
                <th>Preço</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for p in produtos %}
            <tr>
                <td>{{ p.codigo }}</td>
                <td>{{ p.nome }}</td>
                <td>{{ p.p }}|{{ p.m }}|{{ p.g }}|{{ p.gg }}</td>
                <td>{{ p.preco }}</td>
                <td>
                    <a href="/deletar/{{ p.id }}">Excluir</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <br>
    <a href="/">Voltar</a>
</body>
</html>
