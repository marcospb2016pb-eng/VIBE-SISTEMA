<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cupom de Venda - VIBE</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; width: 80mm; margin: 0; padding: 10px; }
        .header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px; }
        .detalhes { font-size: 12px; margin-top: 10px; }
        .footer { text-align: center; border-top: 1px dashed #000; margin-top: 10px; padding-top: 10px; font-size: 10px; }
        .total { font-weight: bold; font-size: 16px; display: flex; justify-content: space-between; }
        @media print {
            .no-print { display: none; }
            body { width: 100%; }
        }
    </style>
</head>
<body onload="window.print()">
    <div class="header">
        <h2 style="margin:0;">VIBE SISTEMA</h2>
        <p style="margin:0;">Comprovante de Venda</p>
    </div>
    
    <div class="detalhes">
        <p><b>Data:</b> {{ data }}</p>
        <p><b>Itens:</b><br>{{ itens }}</p>
        <p><b>Pagamento:</b> {{ metodo }}</p>
        <div class="total">
            <span>TOTAL:</span>
            <span>R$ {{ total }}</span>
        </div>
    </div>

    <div class="footer">
        <p>Obrigado pela preferência!</p>
        <p>Este documento pode ser salvo como PDF</p>
    </div>
</body>
</html>
