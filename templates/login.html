<!DOCTYPE html>
<html>
<head><title>VIBE - Login</title></head>
<body style="text-align:center; padding-top:100px; font-family:sans-serif; background:#222; color:white;">
    <h2>SISTEMA VIBE</h2>
    <form action="/login" method="POST" style="background:#333; display:inline-block; padding:30px; border-radius:10px;">
        <input type="text" name="user" placeholder="Usuário" required style="display:block; margin:10px auto; padding:10px;"><br>
        <input type="password" name="password" placeholder="Senha" required style="display:block; margin:10px auto; padding:10px;"><br>
        <button type="submit" style="padding:10px 40px; background:green; color:white; border:none; cursor:pointer;">ENTRAR</button>
    </form>
</body>
</html>
